version: "3.8"

services:
  db:
    image: postgres:15
    container_name: internhub_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: internhub
    ports:
      - "5432:5432"
    volumes:
      - ./db:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data


  pgadmin:
    image: dpage/pgadmin4
    container_name: internhub_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@internhub.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"

# hasura graphql engine
  hasura:
    image: hasura/graphql-engine:v2.36.0
    container_name: internhub_hasura
    restart: always
    depends_on:
      - db
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://postgres:postgres@db:5432/internhub
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_DEV_MODE: "true"
      HASURA_GRAPHQL_ADMIN_SECRET: myadminsecretkey
    ports:
      - "8080:8080"

volumes:
  postgres_data: